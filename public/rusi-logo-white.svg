<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="white">
  <!-- RUSI crest simplified -->
  <g transform="translate(10,5) scale(0.9)">
    <!-- Outer wreath circle -->
    <circle cx="50" cy="50" r="42" fill="none" stroke="white" stroke-width="2"/>
    <!-- Laurel wreath left -->
    <path d="M20,70 Q15,55 20,40 Q25,30 30,25" fill="none" stroke="white" stroke-width="2"/>
    <path d="M16,65 Q13,52 18,38 Q22,30 27,24" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M22,68 Q19,58 22,45 Q26,35 32,28" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Laurel wreath right -->
    <path d="M80,70 Q85,55 80,40 Q75,30 70,25" fill="none" stroke="white" stroke-width="2"/>
    <path d="M84,65 Q87,52 82,38 Q78,30 73,24" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M78,68 Q81,58 78,45 Q74,35 68,28" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Crown top -->
    <path d="M38,18 L42,10 L46,16 L50,8 L54,16 L58,10 L62,18" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Cross center -->
    <line x1="50" y1="30" x2="50" y2="70" stroke="white" stroke-width="2"/>
    <line x1="35" y1="50" x2="65" y2="50" stroke="white" stroke-width="2"/>
    <!-- Circle center -->
    <circle cx="50" cy="50" r="15" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Bottom ribbon -->
    <path d="M30,78 Q50,85 70,78" fill="none" stroke="white" stroke-width="2"/>
  </g>
  <!-- RUSI text -->
  <text x="120" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" fill="white" letter-spacing="8">RUSI</text>
</svg>
